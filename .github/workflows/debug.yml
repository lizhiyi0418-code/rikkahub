name: Debug Build

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Write Google Services placeholder
        run: |
          cat > app/google-services.json << 'EOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "firebase_url": "https://placeholder.firebaseio.com",
              "project_id": "placeholder",
              "storage_bucket": "placeholder.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                  "android_client_info": {
                    "package_name": "me.rerere.rikkahub"
                  }
                },
                "oauth_client": [],
                "api_key": [{"current_key": "placeholder"}],
                "services": {}
              },
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000001",
                  "android_client_info": {
                    "package_name": "me.rerere.rikkahub.debug"
                  }
                },
                "oauth_client": [],
                "api_key": [{"current_key": "placeholder"}],
                "services": {}
              }
            ],
            "configuration_version": "1"
          }
          EOF

      - name: Install Android SDK 36 and build-tools
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-36" "build-tools;36.0.0"
          echo "=== Installed build-tools ==="
          ls $ANDROID_HOME/build-tools/
          echo "=== AAPT2 version ==="
          $ANDROID_HOME/build-tools/36.0.0/aapt2 version || echo "aapt2 not found in 36.0.0"
          ls $ANDROID_HOME/build-tools/36.0.0/ || true

      - name: Gradle Build Debug
        run: |
          chmod +x gradlew
          ./gradlew clean assembleDebug --no-build-cache --no-daemon

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
